<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>More tags </title>
</head>

<body>
  <div>

    <h1>Lists</h1>
    <p>Ordered and unordered Lists</p>

    <ol>
      <li>List item1</li>
      <li>List item2</li>
    </ol>

    <ul>
      <li>List item3</li>
      <li>List item4</li>
    </ul>
  </div>

  <div>
    <h1>Inputs</h1>
    <div>
      <!-- type : text -> strings -->
      <label for="username">Username</label>
      <input type="text" name="username" id="username" placeholder="Type in your name" required />
    </div>
    <div>
      <!-- type: number -->
      <input type="number" name="age" placeholder="Enter phone.no" required />
    </div>
    <div>
      <!-- type:email -->
      <input type="email" name="email" placeholder="Enter email">
    </div>
    <div>
      <input type="file" name="banner" accept="image/png, image/jpeg, image/avif" size="1024MB" />
      <input type="file" name="reel" accept="video/mp4, video/mov, video/mkv" />
      <input type="file" name="doc" accept="image/*" />
    </div>

    <div>
      <!-- type: hidden -->
      <input type="hidden" name="">
    </div>

    <div>
      <input type="date" name="DOB" />
    </div>

    <div>
      <input type="time" name="time">
    </div>

    <div>
      <input type="datetime-local" name="data&time">
    </div>

    <div>
      <input type="color" name="color" />
    </div>

    <div>

      <input type="password" name="password" />
    </div>

    <div>
      <input type="range" name="range" min="100" max="1000" />
    </div>

    <div>

      <input type="search" name="search" />
    </div>

    <div>
      <h2>Gender</h2>
      <input type="radio" name="gender" id="male" value="Male" />
      <label for="male">Male</label>
      <input type="radio" name="gender" value="Female" id="female" />
      <label for="female">Female</label>
    </div>

    <div>
      <select>
        <option value="america">America</option>
        <option value="india">India</option>
        <option value="england">England</option>
      </select>
    </div>


    <div>
      <h1>Forms</h1>


      <form action="">
        <div>
          <!-- type : text -> strings -->
          <label for="username">Username</label>
          <input type="text" name="username" id="username" placeholder="Type in your name" required />
        </div>
        <div>
          <!-- type: number -->
          <label for="age">Enter you age</label>
          <input type="number" name="age" placeholder="Enter age" id="age" required />
        </div>
        <div>
          <h2>Favorite foods</h2>
          <div>

            <input type="checkbox" name="food" id="biryani" value="Biryani" />
            <label for="biryani">Biryani</label>
          </div>
          <div>

            <input type="checkbox" name="food" id="pizza" value="Pizza" />
            <label for="pizza">Pizza</label>
          </div>
          <div>

            <input type="checkbox" name="food" id="mandi" value="Mandi" />
            <label for="mandi">Mandi</label>
          </div>
          <div>

            <input type="checkbox" name="food" id="noodles" value="Noodles" />
            <label for="noodles">Noodles</label>
          </div>
        </div>

        <button type="submit">Send form</button>
        <input type="submit" value="Send out form" />
        <input type="reset" value="Reset form" />
        <button type="reset">Reser my form</button>

      </form>
    </div>

    <div>
      <h1>table</h1>

      <table border="1">
        <thead>

          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone.no</th>
          </tr>
        </thead>
        <tbody>

          <tr>
            <td>ALok</td>
            <td>alok@mail.com</td>

          </tr>
          <tr>
            <td>Charan</td>
            <td>charan@mail.com</td>
          </tr>
          <tr>
            <td>Srija</td>
            <td>srija@mail.com</td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <th colspan="3">Total names: 3</th>

          </tr>
        </tfoot>
      </table>
    </div>
